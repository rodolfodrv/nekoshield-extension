<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NekoShield</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 320px; background: #080b14; color: #e8eaf6; font-family: 'DM Sans', sans-serif; }
  .header { background: #0d1224; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 16px 20px; display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: #00e5ff; }
  .status-bar { padding: 16px 20px; }
  .status-card { background: #0d1224; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #00ff88; animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-text { font-size: 0.85rem; }
  .status-label { color: #00ff88; font-weight: 600; }
  .status-sub { color: #6b7280; font-size: 0.75rem; margin-top: 2px; }
  .stats { padding: 0 20px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { background: #0d1224; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 12px 14px; }
  .stat-num { font-size: 1.4rem; font-weight: 800; color: #00e5ff; letter-spacing: -1px; }
  .stat-label { font-size: 0.72rem; color: #6b7280; margin-top: 2px; }
  .scan-btn { margin: 0 20px 16px; width: calc(100% - 40px); padding: 12px; background: linear-gradient(135deg, #00e5ff, #0099bb); color: #080b14; border: none; border-radius: 10px; font-weight: 700; font-size: 0.9rem; cursor: pointer; }
  .scan-btn:hover { opacity: 0.9; }
  .footer { padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.07); text-align: center; font-size: 0.72rem; color: #6b7280; }
  .footer a { color: #00e5ff; text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  🛡️ <div class="logo">Neko<span>Shield</span></div>
</div>

<div class="status-bar">
  <div class="status-card">
    <div class="status-dot"></div>
    <div class="status-text">
      <div class="status-label">Protection Active</div>
      <div class="status-sub">Scanning links in real-time</div>
    </div>
  </div>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-num" id="scannedCount">0</div>
    <div class="stat-label">Links scanned</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="threatsCount" style="color:#ff2d78">0</div>
    <div class="stat-label">Threats detected</div>
  </div>
</div>

<button class="scan-btn" id="scanBtn">🔍 Scan Current Page</button>

<div class="footer">
  <a href="https://nekoshield.com" target="_blank">nekoshield.com</a> — Protecting you 🛡️
</div>
