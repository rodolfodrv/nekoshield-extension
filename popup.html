<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NekoShield</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 320px; background: #080b14; color: #e8eaf6; font-family: sans-serif; }
  .header { background: #0d1224; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: #00e5ff; }
  .logout-btn { font-size: 0.72rem; color: #6b7280; cursor: pointer; background: none; border: none; }
  .logout-btn:hover { color: #ff2d78; }

  /* LOGIN */
  .login-section { padding: 24px 20px; }
  .login-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 6px; }
  .login-sub { font-size: 0.78rem; color: #6b7280; margin-bottom: 16px; line-height: 1.5; }
  .input-field { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 12px; color: #e8eaf6; font-size: 0.85rem; outline: none; margin-bottom: 10px; }
  .input-field:focus { border-color: rgba(0,229,255,0.4); }
  .login-btn { width: 100%; padding: 11px; background: linear-gradient(135deg, #00e5ff, #0099bb); color: #080b14; border: none; border-radius: 8px; font-weight: 700; font-size: 0.88rem; cursor: pointer; }
  .login-btn:hover { opacity: 0.9; }
  .login-msg { font-size: 0.78rem; text-align: center; margin-top: 10px; min-height: 18px; }

  /* DASHBOARD */
  .dashboard { display: none; }
  .user-bar { padding: 12px 20px; background: rgba(0,229,255,0.06); border-bottom: 1px solid rgba(0,229,255,0.1); display: flex; align-items: center; justify-content: space-between; }
  .user-email { font-size: 0.75rem; color: #00e5ff; }
  .status-bar { padding: 14px 20px; }
  .status-card { background: #0d1224; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-label { color: #00ff88; font-weight: 700; font-size: 0.82rem; }
  .status-sub { color: #6b7280; font-size: 0.72rem; margin-top: 2px; }
  .stats { padding: 0 20px 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { background: #0d1224; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 12px 14px; }
  .stat-num { font-size: 1.4rem; font-weight: 800; color: #00e5ff; letter-spacing: -1px; }
  .stat-label { font-size: 0.72rem; color: #6b7280; margin-top: 2px; }
  .footer { padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.07); text-align: center; font-size: 0.72rem; color: #6b7280; }
  .footer a { color: #00e5ff; text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🛡️ Neko<span>Shield</span></div>
  <button class="logout-btn" id="logoutBtn" style="display:none">Sign out</button>
</div>

<!-- LOGIN -->
<div class="login-section" id="loginSection">
  <div class="login-title">Sign in to NekoShield</div>
  <div class="login-sub">Enter your email to sign in or create a free account at <a href="https://nekoshield.com" target="_blank" style="color:#00e5ff;text-decoration:none;">nekoshield.com →</a></div>
<div style="display:flex;gap:8px;margin-bottom:12px;">
  <button id="tabLogin" style="flex:1;padding:7px;border-radius:6px;border:1px solid #00e5ff;background:transparent;color:#00e5ff;font-weight:700;font-size:0.8rem;cursor:pointer;">Sign In</button>
  <button id="tabRegister" style="flex:1;padding:7px;border-radius:6px;border:none;background:#00e5ff;color:#080b14;font-weight:700;font-size:0.8rem;cursor:pointer;">Register Free</button>
</div>
  <input type="email" class="input-field" id="emailInput" placeholder="your@email.com" />
  <button class="login-btn" id="loginBtn">Activate Protection 🛡️</button>
  <div class="login-msg" id="loginMsg"></div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="user-bar">
    <div class="user-email" id="userEmailDisplay"></div>
  </div>
  <div class="status-bar">
    <div class="status-card">
      <div class="status-dot"></div>
      <div>
        <div class="status-label">Protection Active</div>
        <div class="status-sub">Scanning links in real-time</div>
      </div>
    </div>
  </div>
  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="scannedCount">0</div>
      <div class="stat-label">Links scanned</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="threatsCount" style="color:#ff2d78">0</div>
      <div class="stat-label">Threats detected</div>
    </div>
  </div>
</div>

<div class="footer">
  <a href="https://nekoshield.com" target="_blank">nekoshield.com</a> — Protecting you 🛡️
</div>

<script src="popup.js"></script>

</body>
</html>
